<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北方孤狼的牛逼网站</title>
    <style>
      body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f0f2f5; }
      h1 { color: #333; }
      p { color: #666; font-size: 18px; }

      /* ================= 新增页脚栏样式 ================= */
      footer {
        margin-top: 80px;
        padding: 15px 20px;
        background-color: #ffffff; /* 给页脚一个白色背景，使其真正“单独划一栏” */
        border-top: 1px solid #e0e0e0; /* 加一条淡淡的顶边线，更有分栏感 */
        
        /* 核心：通过 Flexbox 实现垂直居中 */
        display: flex;
        justify-content: center; /* 水平居中 */
        align-items: center;     /* 垂直居中 */
        gap: 40px;               /* 两个文字块之间的左右间距 */
      }
      
      /* 重置页脚内 p 标签的默认边距，确保垂直居中不被干扰 */
      footer p {
        margin: 0 !important; 
        color: #a0a0a0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h1>🎉 欢迎来到北方孤狼的个人网站</h1>
    <p>不要问为什么只有index，其他内容还在建设中（某个来自香港的特异人士让我在网页上加上他的大名，然而无人在意）</p>
    
    <footer>
      <p>感谢 GitHub 和 Cloudflare 提供的技术支持</p>
      <p>作者 QQ：873253482</p>
    </footer>
  </body>
</html>

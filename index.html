<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北方孤狼的牛逼网站</title>
    <style>
      /* 基础样式 */
      body { margin: 0; font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }
      .main { flex: 1; padding-top: 50px; }
      h1 { color: #333; }
      .main p { color: #666; font-size: 18px; }

      /* 页脚 */
      footer { padding: 15px 20px; background: #fff; border-top: 1px solid #e0e0e0; display: flex; justify-content: center; align-items: center; gap: 40px; }
      footer p { margin: 0; color: #a0a0a0; font-size: 14px; }

      /* 弹窗 */
      .mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 99; display: flex; justify-content: center; align-items: center; }
      .box { background: #fff; padding: 30px; border-radius: 12px; width: 320px; }
      .box h2 { color: #ff4d4f; margin: 0 0 10px; font-size: 24px; }
      .box p { color: #333; font-size: 16px; margin: 0 0 25px; font-weight: bold; }
      .btns { display: flex; flex-direction: column; gap: 12px; }
      .btn { padding: 12px; font-size: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
      .btn-1 { background: #1677ff; color: #fff; }
      .btn-2 { background: #f5f5f5; color: #666; border: 1px solid #d9d9d9; }
    </style>
  </head>
  <body>

    <div class="mask" id="pop">
      <div class="box">
        <h2>⚠️ 警告</h2>
        <p>该网站未满18岁禁止访问 🔞</p>
        <div class="btns">
          <button class="btn btn-1" onclick="closePop()">我保證我已滿18歲，確定进入！</button>
          <button class="btn btn-2" onclick="closePop()">那咋了我就要访问</button>
        </div>
      </div>
    </div>

    <div class="main">
      <h1>🎉 欢迎来到北方孤狼的个人网站</h1>
      <p>不要问为什么只有index，也不要问为什么如此简陋，因为我很懒</p>
    </div>
    
    <footer>
      <p>感谢 GitHub 和 Cloudflare 提供的技术支持</p>
      <p>作者 QQ：873253482</p>
    </footer>

    <script>
      function closePop() { document.getElementById('pop').style.display = 'none'; }
    </script>
  </body>
</html>
